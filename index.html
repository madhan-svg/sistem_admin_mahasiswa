<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Admin Mahasiswa & Dosen</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon Tambahan -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- HEADER / NAVIGATION -->
    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="bg-indigo-600 text-white p-2.5 rounded-xl shadow-md shadow-indigo-100">
                        <i class="fa-solid fa-graduation-cap text-xl"></i>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-blue-600 bg-clip-text text-transparent">
                        Sistem Admin Kampus
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Tab Navigation -->
        <div class="flex space-x-1 bg-slate-200/60 p-1 rounded-xl max-w-md mb-8">
            <button onclick="switchTab('dosen')" id="tab-dosen" class="tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 bg-white text-indigo-600 shadow-sm">
                Data Dosen
            </button>
            <button onclick="switchTab('students')" id="tab-students" class="tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900">
                Data Mahasiswa
            </button>
        </div>

        <!-- AREA TAB DOSEN -->
        <div id="content-dosen" class="tab-content space-y-6">
            <!-- Form Tambah Dosen -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-indigo-600"></i> Tambah Data Dosen
                </h2>
                <form id="dosenForm" class="grid grid-cols-1 md:grid-cols-3 gap-4" onsubmit="handleDosenSubmit(event)">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">NIDN</label>
                        <input type="text" id="nidn" placeholder="Contoh: 041234567" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nama Lengkap</label>
                        <input type="text" id="namaDosen" placeholder="Nama Beserta Gelar" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition duration-150 outline-none">
                    </div>
                    <div class="flex items-end">
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-98 text-white font-semibold px-6 py-3 rounded-xl shadow-lg shadow-indigo-100 transition duration-150">
                            Simpan Data
                        </button>
                    </div>
                </form>
            </div>

            <!-- Tabel Data Dosen -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-6 border-b border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800">Daftar Dosen Aktif</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/75 border-b border-slate-100 text-slate-500 text-xs uppercase tracking-wider font-semibold">
                                <th class="px-6 py-4">NIDN</th>
                                <th class="px-6 py-4">Nama Lengkap</th>
                                <th class="px-6 py-4 text-center w-32">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="dosenTableBody" class="divide-y divide-slate-100 text-sm text-slate-600">
                            <!-- Diisi oleh JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- AREA TAB MAHASISWA (Dummy placeholder) -->
        <div id="content-students" class="tab-content hidden space-y-6">
            <div class="bg-white rounded-2xl p-8 text-center text-slate-500 border border-slate-100 shadow-sm">
                <i class="fa-solid fa-users text-4xl text-slate-300 mb-3"></i>
                <p class="font-medium">Halaman Data Mahasiswa</p>
                <p class="text-xs text-slate-400 mt-1">Gunakan logika yang sama untuk mengimplementasikannya secara penuh.</p>
            </div>
        </div>

    </main>

    <!-- MODERN TOAST NOTIFICATION CONTAINER -->
    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- MODAL KONFIRMASI HAPUS (Custom UI - Lembut & Elegan) -->
    <div id="deleteModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300 ease-out">
        <div id="modalContent" class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 opacity-0 transition-all duration-300 ease-out">
            <div class="text-center">
                <!-- Ikon Warning Bergerak Lembut -->
                <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-rose-50 text-rose-500 mb-4">
                    <i class="fa-solid fa-triangle-exclamation text-2xl animate-pulse"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-1.5">Hapus Data Permanen?</h3>
                <p class="text-sm text-slate-500 mb-6 leading-relaxed">
                    Tindakan ini tidak dapat dibatalkan. Data akan segera dihapus dari web ini serta Google Sheets Anda.
                </p>
            </div>
            <div class="flex space-x-3">
                <button id="cancelDeleteBtn" class="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl transition duration-200 active:scale-95">
                    Batal
                </button>
                <button id="confirmDeleteBtn" class="flex-1 px-4 py-3 bg-gradient-to-r from-rose-500 to-red-600 hover:from-rose-600 hover:to-red-700 text-white font-semibold rounded-xl transition duration-200 shadow-lg shadow-rose-100 active:scale-95">
                    Ya, Hapus
                </button>
            </div>
        </div>
    </div>

    <!-- Script File -->
    <script src="app.js"></script>
</body>
</html>
